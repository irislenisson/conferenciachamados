<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência Trabalho - Autenticação</title>
    <!-- Google Fonts: Inter e Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Estilos específicos premium para a tela de Login */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.08) 0%, rgba(5, 150, 105, 0.08) 100%);
            box-sizing: border-box;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            border-bottom: none;
            padding-bottom: 0;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .login-form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .login-form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .login-input {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(30, 58, 138, 0.15);
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .alert-error {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #ef4444;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Top float theme switch */
        .login-theme-box {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="login-theme-box">
        <button id="theme-toggle" class="theme-btn" aria-label="Alternar tema">
            <span class="theme-icon">🌙</span>
        </button>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h2>Acesso Restrito</h2>
                <p>Insira suas credenciais para gerenciar a conferência</p>
            </div>

            {% if error %}
            <div class="alert-error">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="login-form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" class="login-input" placeholder="admin" required autocomplete="username">
                </div>

                <div class="login-form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" class="login-input" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login">Entrar no Painel</button>
            </form>
        </div>
    </div>

    <script>
        // Carrega o tema salvo do localStorage
        const themeToggle = document.getElementById('theme-toggle');
        const applyTheme = (theme) => {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.querySelector('.theme-icon').textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.querySelector('.theme-icon').textContent = '🌙';
            }
            localStorage.setItem('theme', theme);
        };

        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(nextTheme);
        });
    </script>
</body>
</html>
